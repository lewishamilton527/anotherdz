<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой профиль</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">
    <header>
        <div class="header-content fade-in">
            <h1>Профиль: Дарын</h1>
            <div class="controls">
                <span id="visitCounterDisplay" class="badge">Посещений: 0</span>
                <button id="themeToggleBtn" class="icon-btn">☀️</button>
            </div>
        </div>
    </header>

    <main>
        <section class="card fade-in">
            <h2>Обо мне</h2>
            <p>Увлекаюсь олимпиадным программированием, инженерией и баскетболом. В свободное время слушаю Tame Impala и Phonk.</p>
        </section>

        <section class="card fade-in">
            <h2>Мои задачи (To-Do)</h2>
            <div class="todo-container">
                <div class="todo-input-group">
                    <input type="text" id="todoInput" placeholder="Добавить новую задачу...">
                    <button id="addTodoBtn">Добавить</button>
                </div>
                <ul id="todoList"></ul>
            </div>
        </section>

        <section class="card fade-in">
            <h2>Связь со мной</h2>
            <form id="contactForm">
                <div class="input-group">
                    <input type="text" id="nameInput" placeholder="Ваше имя">
                </div>
                <div class="input-group">
                    <input type="email" id="emailInput" placeholder="Ваш Email">
                </div>
                <div id="formError" class="error-text"></div>
                <button type="submit">Отправить заявку</button>
            </form>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
